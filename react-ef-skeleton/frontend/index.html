<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skeleton App — React + EF + PostgreSQL</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f9fafb; color: #111827; }
      a { color: #2563eb; text-decoration: none; }
      a:hover { text-decoration: underline; }
      input, button { font-family: inherit; }

      /* ---- layout ---- */
      .page { min-height: 100vh; display: flex; align-items: center; justify-content: center;
               padding: 1.5rem; background: linear-gradient(135deg,#eff6ff 0%,#f9fafb 100%); }
      .card { background: #fff; border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 420px;
               box-shadow: 0 10px 15px -3px rgba(0,0,0,.08), 0 4px 6px -2px rgba(0,0,0,.04); }

      /* ---- logo ---- */
      .logo { font-size: 2.5rem; text-align: center; margin-bottom: 1rem; color: #2563eb; }
      h1 { font-size: 1.75rem; font-weight: 700; text-align: center; color: #111827; margin-bottom: .25rem; }
      .subtitle { text-align: center; color: #6b7280; margin-bottom: 2rem; font-size: .9375rem; }

      /* ---- form ---- */
      .form { display: flex; flex-direction: column; gap: 1.125rem; }
      .field { display: flex; flex-direction: column; gap: .375rem; }
      label { font-weight: 500; font-size: .875rem; color: #374151; }
      input[type=email], input[type=password] {
        font-size: .9375rem; padding: .625rem .875rem;
        border: 1px solid #e5e7eb; border-radius: 8px; width: 100%;
        outline: none; transition: border-color .15s, box-shadow .15s; background: #fff; color: #111827; }
      input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.15); }
      .btn { background: #2563eb; color: #fff; padding: .75rem; margin-top: .5rem;
              border-radius: 8px; font-size: 1rem; font-weight: 600; border: none; cursor: pointer; width: 100%;
              transition: background .15s; }
      .btn:hover { background: #1d4ed8; }
      .footer-link { text-align: center; margin-top: 1.5rem; color: #6b7280; font-size: .9rem; }

      /* ---- tabs ---- */
      .tabs { display: flex; margin-bottom: 1.75rem; border-radius: 10px; overflow: hidden;
               border: 1px solid #e5e7eb; }
      .tab { flex: 1; padding: .6rem; text-align: center; font-size: .875rem; font-weight: 600;
              cursor: pointer; background: #f9fafb; color: #6b7280; border: none; transition: all .15s; }
      .tab.active { background: #2563eb; color: #fff; }

      /* ---- register extra field ---- */
      .hidden { display: none; }

      /* ---- error ---- */
      .error-box { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626;
                   border-radius: 8px; padding: .75rem 1rem; margin-bottom: 1.25rem; font-size: .9rem; }

      /* ---- stack info (preview only) ---- */
      .stack { margin-top: 2rem; border-top: 1px solid #f3f4f6; padding-top: 1.5rem;
               display: flex; gap: .5rem; flex-wrap: wrap; justify-content: center; }
      .tag { background: #f3f4f6; color: #374151; border-radius: 20px; padding: .25rem .75rem;
              font-size: .75rem; font-weight: 600; }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="card">
        <div class="logo">⬡</div>
        <h1>Skeleton App</h1>
        <p class="subtitle">React · .NET 8 · Entity Framework · PostgreSQL</p>

        <div class="tabs">
          <button class="tab active" onclick="switchTab('login', this)">Entrar</button>
          <button class="tab" onclick="switchTab('register', this)">Criar conta</button>
        </div>

        <div id="error" class="error-box hidden"></div>

        <form class="form" onsubmit="handleSubmit(event)">
          <div class="field hidden" id="nameField">
            <label for="name">Nome</label>
            <input type="text" id="name" placeholder="Seu nome" />
          </div>
          <div class="field">
            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="seu@email.com" required />
          </div>
          <div class="field">
            <label for="password">Senha</label>
            <input type="password" id="password" placeholder="••••••••" required />
          </div>
          <button type="submit" class="btn" id="submitBtn">Entrar</button>
        </form>

        <div class="stack">
          <span class="tag">React 18</span>
          <span class="tag">.NET 8 Web API</span>
          <span class="tag">Entity Framework</span>
          <span class="tag">PostgreSQL</span>
          <span class="tag">JWT Auth</span>
        </div>
      </div>
    </div>

    <script>
      let mode = 'login';

      function switchTab(newMode, el) {
        mode = newMode;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        const nameField = document.getElementById('nameField');
        const submitBtn = document.getElementById('submitBtn');
        if (newMode === 'register') {
          nameField.classList.remove('hidden');
          submitBtn.textContent = 'Criar conta';
        } else {
          nameField.classList.add('hidden');
          submitBtn.textContent = 'Entrar';
        }
        clearError();
      }

      function showError(msg) {
        const el = document.getElementById('error');
        el.textContent = msg;
        el.classList.remove('hidden');
      }

      function clearError() {
        document.getElementById('error').classList.add('hidden');
      }

      function handleSubmit(e) {
        e.preventDefault();
        clearError();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        if (!email || !password) { showError('Preencha todos os campos.'); return; }
        if (mode === 'register') {
          const name = document.getElementById('name').value;
          if (!name) { showError('Informe seu nome.'); return; }
          if (password.length < 6) { showError('Senha deve ter no mínimo 6 caracteres.'); return; }
          showError('✓ Esta é a prévia do layout. Conecte ao backend para funcionar.');
        } else {
          showError('✓ Esta é a prévia do layout. Conecte ao backend para funcionar.');
        }
      }
    </script>
  </body>
</html>
